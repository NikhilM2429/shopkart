<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Receipt - ShopKart</title>


<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="responsiv.css">
<link rel="stylesheet" href="receipt.css">


</head>
<body>


<div class="receipt-container">


    <div class="receipt-header">
        <h1><i class="ti ti-shopping-bag"></i> ShopKart Receipt</h1>


        <div class="order-status">
            <i class="ti ti-check-circle"></i>
            <span id="orderStatus">Confirmed</span>
        </div>
    </div>


    <div class="receipt-info">


        <div class="info-box">
            <h3><i class="ti ti-tag"></i> Order Details</h3>


            <p><strong>Order ID:</strong> <span id="orderId"></span></p>


            <p><strong>Order Date:</strong> <span id="orderDate"></span></p>


            <p><strong>Payment:</strong> <span id="paymentMethod"></span></p>
        </div>


        <div class="info-box">
            <h3><i class="ti ti-user"></i> Customer Details</h3>


            <p><strong>Name:</strong> <span id="customerName"></span></p>


            <p><strong>Email:</strong> <span id="customerEmail"></span></p>


            <p><strong>Phone:</strong> <span id="customerPhone"></span></p>
        </div>


    </div>


    <div class="info-box shipping-box">
        <h3><i class="ti ti-map-pin"></i> Shipping Address</h3>


        <p id="shippingAddress"></p>
    </div>


    <div class="products-section">
        <h3><i class="ti ti-box"></i> Products Ordered</h3>


        <table class="products-table">


            <thead>
                <tr>
                    <th>Product</th>
                    <th>Category</th>
                    <th>Qty</th>
                    <th>Price</th>
                    <th>Total</th>
                </tr>
            </thead>


            <tbody id="productsTable"></tbody>


        </table>
    </div>


    <div class="total-section">


        <div class="total-row">
            <span>Subtotal:</span>
            <span id="subtotal"></span>
        </div>


        <div class="total-row">
            <span>Shipping:</span>
            <span id="shipping"></span>
        </div>


        <div class="total-row">
            <span>Tax:</span>
            <span id="tax"></span>
        </div>


        <div class="total-row total-final">
            <span>Total Amount:</span>
            <span id="totalAmount"></span>
        </div>


    </div>


    <div class="receipt-actions">


        <button class="btn btn-primary" onclick="window.print()">
            <i class="ti ti-printer"></i> Print Receipt
        </button>


        <a href="index.html" class="btn btn-home">
            <i class="ti ti-home"></i> Continue Shopping
        </a>


    </div>


</div>


<script src="receipt.js"></script>


</body>
</html>
