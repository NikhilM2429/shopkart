<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Receipt - ShopKart</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    padding:20px;
}

.receipt-container{
    max-width:1000px;
    margin:auto;
    background:#fff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.receipt-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:2px solid #eee;
    padding-bottom:15px;
}

.order-status{
    color:green;
    font-weight:bold;
}

.receipt-info{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin:25px 0;
}

.info-box{
    border:1px solid #eee;
    padding:15px;
    border-radius:10px;
}

.info-box h3{
    margin-bottom:10px;
}

.products-table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

.products-table th,
.products-table td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

.products-table th{
    background:#f7f7f7;
}

.total-section{
    margin-top:25px;
    text-align:right;
}

.total-row{
    margin:8px 0;
}

.total-final{
    font-size:22px;
    font-weight:bold;
    color:#28a745;
}

.receipt-actions{
    margin-top:30px;
    text-align:center;
}

.btn{
    padding:12px 25px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin:5px;
}

.btn-primary{
    background:#28a745;
    color:#fff;
}

.btn-home{
    background:#333;
    color:#fff;
    text-decoration:none;
}

@media print{

    body{
        background:white;
    }

    .receipt-actions{
        display:none;
    }

    .receipt-container{
        box-shadow:none;
        max-width:100%;
    }
}
</style>

</head>
<body>

<div class="receipt-container">

    <div class="receipt-header">
        <h1>🛍️ ShopKart Receipt</h1>

        <div class="order-status">
            <i class="ti ti-check-circle"></i>
            <span id="orderStatus">Confirmed</span>
        </div>
    </div>

    <div class="receipt-info">

        <div class="info-box">
            <h3>Order Details</h3>

            <p><strong>Order ID:</strong> <span id="orderId"></span></p>

            <p><strong>Order Date:</strong> <span id="orderDate"></span></p>

            <p><strong>Payment:</strong> <span id="paymentMethod"></span></p>
        </div>

        <div class="info-box">
            <h3>Customer Details</h3>

            <p><strong>Name:</strong> <span id="customerName"></span></p>

            <p><strong>Email:</strong> <span id="customerEmail"></span></p>

            <p><strong>Phone:</strong> <span id="customerPhone"></span></p>
        </div>

    </div>

    <div class="info-box">
        <h3>Shipping Address</h3>

        <p id="shippingAddress"></p>
    </div>

    <h3 style="margin-top:25px;">📦 Products Ordered</h3>

    <table class="products-table">

        <thead>
            <tr>
                <th>Product</th>
                <th>Category</th>
                <th>Qty</th>
                <th>Price</th>
                <th>Total</th>
            </tr>
        </thead>

        <tbody id="productsTable"></tbody>

    </table>

    <div class="total-section">

        <div class="total-row">
            Subtotal:
            <span id="subtotal"></span>
        </div>

        <div class="total-row">
            Shipping:
            <span id="shipping"></span>
        </div>

        <div class="total-row">
            Tax:
            <span id="tax"></span>
        </div>

        <div class="total-row total-final">
            Total:
            <span id="totalAmount"></span>
        </div>

    </div>

    <div class="receipt-actions">

        <button class="btn btn-primary" onclick="window.print()">
            🖨 Print Receipt
        </button>

        <a href="index.html" class="btn btn-home">
            Continue Shopping
        </a>

    </div>

</div>

<script src="receipt.js"></script>

</body>
</html>
