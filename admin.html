<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#6c47ff">
  <title>ShopKart Admin - Add Products</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    .admin-wrapper {
      min-height: 100vh;
      background: #f8f9fa;
      padding: 20px;
    }
    
    .admin-header {
      background: #6c47ff;
      color: white;
      padding: 25px 30px;
      margin-bottom: 30px;
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .admin-header h1 {
      font-size: 28px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .admin-logout {
      background: white;
      color: #6c47ff;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s;
    }
    
    .admin-logout:hover {
      background: #f3f0ff;
      transform: translateY(-2px);
    }
    
    .admin-container {
      max-width: 800px;
      margin: 0 auto;
    }
    
    .add-product-card {
      background: white;
      padding: 35px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }
    
    .add-product-card h2 {
      font-size: 26px;
      margin-bottom: 30px;
      color: #374151;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .form-group {
      margin-bottom: 24px;
    }
    
    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 10px;
      color: #374151;
      font-size: 15px;
    }
    
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 14px 18px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 16px;
      font-family: 'Nunito', sans-serif;
      transition: all 0.3s;
    }
    
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #6c47ff;
      box-shadow: 0 0 0 3px rgba(108, 71, 255, 0.1);
    }
    
    .form-group textarea {
      resize: vertical;
      min-height: 120px;
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    
    .btn-add-product {
      background: #6c47ff;
      color: white;
      border: none;
      padding: 16px 35px;
      border-radius: 8px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.3s;
    }
    
    .btn-add-product:hover {
      background: #5a38ee;
      transform: translateY(-2px);
    }
    
    .product-list {
      margin-top: 50px;
    }
    
    .product-list h3 {
      font-size: 22px;
      margin-bottom: 25px;
      color: #374151;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .product-item {
      background: white;
      padding: 18px 24px;
      border-radius: 8px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      transition: all 0.3s;
    }
    
    .product-item:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    
    .product-item-info {
      display: flex;
      gap: 20px;
      align-items: center;
    }
    
    .product-item-img {
      width: 60px;
      height: 60px;
      background: #f3f0ff;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
    }
    
    .product-item-details h4 {
      font-size: 18px;
      margin-bottom: 6px;
      color: #374151;
    }
    
    .product-item-details p {
      font-size: 14px;
      color: #6b7280;
    }
    
    .btn-delete {
      background: #ef4444;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s;
    }
    
    .btn-delete:hover {
      background: #dc2626;
      transform: translateY(-2px);
    }
    
    .admin-toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #10b981;
      color: white;
      padding: 18px 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      z-index: 1000;
      animation: slideIn 0.3s ease;
    }
    
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    .no-products {
      text-align: center;
      color: #6b7280;
      padding: 40px;
      font-size: 16px;
    }
    
    @media (max-width: 767px) {
      .form-row {
        grid-template-columns: 1fr;
        gap: 0;
      }
      
      .admin-header {
        padding: 20px;
      }
      
      .admin-header h1 {
        font-size: 22px;
      }
      
      .add-product-card {
        padding: 25px;
      }
      
      .product-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
      }
      
      .btn-delete {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="admin-wrapper">
    <div class="admin-header">
      <h1><i class="ti ti-admin"></i> ShopKart Admin - Add Products</h1>
      <button class="admin-logout" id="adminLogoutBtn" type="button">
        <i class="ti ti-logout"></i> Logout
      </button>
    </div>

    <div class="admin-container">
      <div class="add-product-card">
        <h2><i class="ti ti-plus"></i> Add New Product</h2>
        
        <form id="addProductForm">
          <div class="form-group">
            <label for="productName">Product Name</label>
            <input type="text" id="productName" name="productName" placeholder="Enter product name (e.g., iPhone 15 Pro)" required>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="productCategory">Category</label>
              <select id="productCategory" name="productCategory" required>
                <option value="">Select Category</option>
                <option value="electronics">Electronics</option>
                <option value="fashion">Fashion</option>
                <option value="home">Home & Living</option>
                <option value="beauty">Beauty</option>
                <option value="sports">Sports</option>
                <option value="books">Books</option>
                <option value="toys">Toys & Games</option>
                <option value="grocery">Grocery</option>
              </select>
            </div>

            <div class="form-group">
              <label for="productPrice">Price (₹)</label>
              <input type="number" id="productPrice" name="productPrice" placeholder="Enter selling price" min="1" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="productOriginalPrice">Original Price (₹)</label>
              <input type="number" id="productOriginalPrice" name="productOriginalPrice" placeholder="Enter original price" min="1" required>
            </div>

            <div class="form-group">
              <label for="productImage">Image Emoji/Icon</label>
              <input type="text" id="productImage" name="productImage" placeholder="📱 🎧 💻 👟 (any emoji)" required>
            </div>
          </div>

          <div class="form-group">
            <label for="productDescription">Description</label>
            <textarea id="productDescription" name="productDescription" placeholder="Describe the product features and details..." required></textarea>
          </div>

          <div class="form-group">
            <label for="productRating">Rating (1-5 stars)</label>
            <input type="number" id="productRating" name="productRating" placeholder="Enter rating (e.g., 4.5)" min="1" max="5" step="0.1" required>
          </div>

          <div class="form-group">
            <label for="productStock">Stock Quantity</label>
            <input type="number" id="productStock" name="productStock" placeholder="How many items available?" min="0" required>
          </div>

          <button type="submit" class="btn-add-product">
            <i class="ti ti-plus"></i> Add Product to Website
          </button>
        </form>
      </div>

      <div class="product-list">
        <h3><i class="ti ti-list"></i> Products Added to Website</h3>
        <div id="productsAddedList"></div>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
