<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ShopKart</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="responsiv.css">
    
    <!-- ADDED: User/Admin selection styles -->
    <style>
        .user-admin-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .role-option {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #d1d5db;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        
        .role-option:hover {
            border-color: #6c47ff;
            background: #f3f0ff;
        }
        
        .role-option.active {
            border-color: #6c47ff;
            background: #6c47ff;
            color: white;
        }
        
        .role-option i {
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .role-option span {
            font-size: 15px;
            font-weight: 600;
        }
        
        .role-option.active i,
        .role-option.active span {
            color: white;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="logo">
                    <i class="fas fa-shopping-bag"></i>
                    <span>ShopKart</span>
                </a>
                <h2>Welcome Back</h2>
                <p>Login to your account</p>
            </div>
            
            <!-- ADDED: User/Admin Selection Buttons -->
            <div class="user-admin-selector">
                <div class="role-option active" id="userRole" onclick="selectRole('user')">
                    <i class="fas fa-user"></i>
                    <span>User</span>
                </div>
                <div class="role-option" id="adminRole" onclick="selectRole('admin')">
                    <i class="fas fa-user-shield"></i>
                    <span>Admin</span>
                </div>
            </div>
            
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i> Email
                    </label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    <span class="error-message" id="emailError"></span>
                </div>
                
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <div class="password-input">
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                        <button type="button" class="toggle-password" data-target="password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                </div>
                
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>

                <button type="button" class="btn-primary btn-block" onclick="login()">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>

                <div class="divider">
                    <span>OR</span>
                </div>

                <button type="button"
                   class="btn-social btn-google"
                   onclick="googleLogin()">
                   <i class="fab fa-google"></i>
                        Continue with Google
                    </button>
                
                <p class="auth-switch">
                    Don't have an account? <a href="register.html">Register here</a>
                </p>
            </form>
        </div>
    </div>
    
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">Message</span>
    </div>
    
    <!-- ADDED: Role selection script -->
    <script>
        // Current selected role (default: user)
        let selectedRole = 'user';
        
        // Select role (user or admin)
        function selectRole(role) {
            selectedRole = role;
            
            // Update active class
            const userRole = document.getElementById('userRole');
            const adminRole = document.getElementById('adminRole');
            
            if (role === 'user') {
                userRole.classList.add('active');
                adminRole.classList.remove('active');
            } else {
                adminRole.classList.add('active');
                userRole.classList.remove('active');
            }
        }
        
        // Initialize default role on page load
        document.addEventListener('DOMContentLoaded', function() {
            selectRole('user');
        });
    </script>
    
    <script src="login.js"></script>
    <script src="main.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="googleAuth.js"></script>
    <script src="auth.js"></script>
</body>
</html>
