<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - ShopKart</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/checkout.css">
</head>
<body style="background: #c2c3c5; overflow-x: hidden;">

<nav class="navbar">
  <div class="nav-inner">
    <a href="../html/index.html" class="logo">
      <div class="logo-icon"><i class="ti ti-shopping-bag"></i></div>
      <span class="logo-text">Shop<span>Kart</span></span>
    </a>

    <div class="nav-actions">
      <a href="../html/index.html" class="nav-btn btn-login" id="loginBtn">
        <i class="ti ti-user"></i>
        <span>Login</span>
      </a>
    </div>
  </div>
</nav>

<div class="checkout-container">
  <div class="checkout-grid">
    <div>
      <div class="checkout-section">
        <h2><i class="ti ti-shopping-cart"></i> Your Cart Items</h2>
        <div id="checkoutItems"></div>
      </div>

      <div class="checkout-section" style="margin-top: 20px;">
        <h2><i class="ti ti-map-pin"></i> Shipping Information</h2>
        <form class="checkout-form" id="checkoutForm">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" required placeholder="Enter your name">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" required placeholder="Enter your email">
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input type="tel" id="phone" required placeholder="Enter your phone number">
          </div>
          <div class="form-group">
            <label>Address</label>
            <input type="text" id="address" required placeholder="Enter your full address">
          </div>
          <div class="form-group">
            <label>City</label>
            <input type="text" id="city" required placeholder="Enter your city">
          </div>
          <div class="form-group">
            <label>Pincode</label>
            <input type="text" id="pincode" required placeholder="Enter pincode">
          </div>
        </form>
      </div>
    </div>

    <div class="checkout-summary">
      <h2 style="margin-bottom: 20px;">Order Summary</h2>
      <div class="summary-row">
        <span>Subtotal</span>
        <span id="subtotal">₹0</span>
      </div>
      <div class="summary-row">
        <span>Shipping</span>
        <span id="shipping">₹0</span>
      </div>
      <div class="summary-row">
        <span>Tax (18% GST)</span>
        <span id="tax">₹0</span>
      </div>
      <div class="summary-row total">
        <span>Total</span>
        <span id="total">₹0</span>
      </div>
      <button class="checkout-btn" id="placeOrderBtn" type="button" >
        <i class="ti ti-check"></i> Place Order

      </button>
    </div>
  </div>
</div>

<div id="toast" class="toast">
  <i class="ti ti-check"></i> <span id="toastMsg"></span>
</div>

<script src="../js/checkout.js"></script>
</body>
</html>
